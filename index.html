<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000; 
    }

    #screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #light {
        width: 10vmax;
        height: 10vmax;
        border-radius: 50%;
        position: absolute;
        background: radial-gradient(
            circle,
            rgba(255, 120, 120, 0.95) 0%,
            rgba(255, 80, 80, 0.75) 20%,
            rgba(220, 40, 40, 0.35) 45%,
            rgba(200, 0, 0, 0.08) 70%,
            rgba(255, 0, 0, 0) 100%
        );
        opacity: 0;
        transform: scale(0.2);
        filter: blur(12px);
        animation: lightAppear 2.5s ease-out forwards;
        animation-delay: 2s; 
    }

    @keyframes lightAppear {
        0% { opacity: 0; transform: scale(0.2); filter: blur(30px); }
        40% { opacity: 0.9; }
        100% { opacity: 1; transform: scale(2.8); filter: blur(60px); }
    }

    #flowerCanvas {
        position: absolute;
        top: 0; left: 0;
        z-index: 10;
    }
</style>
</head>

<body>

<div id="screen">
    <div id="light"></div>
    <canvas id="flowerCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');

    let scale = 1;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        ctx.translate(canvas.width / 2, canvas.height / 2);
        
        const minScreen = Math.min(canvas.width, canvas.height);
        scale = minScreen / 1000; 
        ctx.scale(scale, scale);
        
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
    }
    window.addEventListener('resize', resize);
    
    // ==========================================
    // VARIABLES PARA LA MEMORIA Y EL TAMAÑO
    // ==========================================
    let allShapes = []; 
    let currentShape = null; 
    let maxRadius = 0; 

    // ==========================================
    // MOTOR TURTLE
    // ==========================================
    class Turtle {
        constructor(ctx) {
            this.ctx = ctx;
            this.x = 0;
            this.y = 0;
            this.heading = 0;
            this.pen = true;
        }
        penup() { this.pen = false; }
        pendown() { this.pen = true; }
        left(a) { this.heading += a; }
        right(a) { this.heading -= a; }
        
        forward(d) {
            const rad = this.heading * Math.PI / 180;
            this.x += d * Math.cos(rad);
            this.y -= d * Math.sin(rad); 
            
            const currentR = Math.sqrt(this.x * this.x + this.y * this.y);
            if (currentR > maxRadius) {
                maxRadius = currentR;
            }

            if (this.pen) {
                this.ctx.lineTo(this.x, this.y);
                if (currentShape) {
                    currentShape.points.push({x: this.x, y: this.y});
                }
            } else {
                this.ctx.moveTo(this.x, this.y);
            }
        }
        
        circle(radius, extent) {
            const steps = Math.max(Math.floor(Math.abs(extent) / 4), 2); 
            const stepAngle = extent / steps;
            const rad = Math.abs(radius);
            const stepLen = 2 * rad * Math.sin((Math.abs(stepAngle) * Math.PI / 180) / 2);
            
            for (let i = 0; i < steps; i++) {
                this.left(stepAngle / 2);
                this.forward(stepLen);
                this.left(stepAngle / 2);
            }
        }
    }

    const colores = ['#FFC800', '#FFE75C', '#FFED8A'];
    
    function dibujo(t, a, n) {
        t.circle(5 + n, 60);
        t.left(a);
        t.circle(5 + n, 60);
    }

    let currentStep = 0;
    const maxSteps = 360; 
    let turtle;

    function drawFrame() {
        for (let j = 0; j < 2; j++) {
            if (currentStep >= maxSteps) {
                setTimeout(startSpin, 2000);
                return; 
            }

            const i = currentStep;
            const colorIndex = Math.floor(i / 15) % 3;
            const c = colores[colorIndex];
            
            ctx.strokeStyle = c;
            ctx.fillStyle = "black";
            ctx.lineWidth = 2 / scale; 

            ctx.beginPath();
            ctx.moveTo(turtle.x, turtle.y);
            currentShape = { color: c, fill: true, startX: turtle.x, startY: turtle.y, points: [] };
            dibujo(turtle, 90, i / 2);
            ctx.fill(); 
            ctx.stroke(); 
            allShapes.push(currentShape); 

            ctx.beginPath();
            ctx.moveTo(turtle.x, turtle.y);
            currentShape = { color: c, fill: false, startX: turtle.x, startY: turtle.y, points: [] };
            dibujo(turtle, 160, i * 1.2);
            ctx.stroke(); 
            allShapes.push(currentShape); 

            currentShape = null; 
            turtle.penup();
            dibujo(turtle, 0, 0);
            dibujo(turtle, 90, i / 2);
            turtle.pendown();

            currentStep++;
        }
        requestAnimationFrame(drawFrame);
    }

    // ==========================================
    // FÍSICAS: ROTACIÓN Y RESISTENCIA EN PÉTALOS
    // ==========================================
    let currentAngle = 0;
    let spinSpeed = 0;
    const maxSpinSpeed = 1.3;

    function startSpin() {
        spinSpeed += 0.006;
        if (spinSpeed > maxSpinSpeed) {
            spinSpeed = maxSpinSpeed;
        }
        currentAngle += spinSpeed;

        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(scale, scale);
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        const baseRotationRad = currentAngle * Math.PI / 180;
        
        // --- AQUÍ ESTÁ EL CAMBIO ---
        // Ahora solo el 15% más interno de la flor (el centro) es rígido.
        const threshold = maxRadius * 0.15; 
        
        // Ajustamos la fuerza para que el pétalo largo se doble bonito sin romperse
        const bendFactor = spinSpeed * 0.08; 

        function transformPoint(x, y) {
            const r = Math.sqrt(x * x + y * y); 
            const theta = Math.atan2(y, x); 

            let dragRad = 0;
            
            // ¿El punto está en el pétalo (afuera del centro rígido)?
            if (r > threshold) {
                dragRad = -(bendFactor * (r - threshold)) * (Math.PI / 180);
            }
            
            const newTheta = theta + baseRotationRad + dragRad;

            return {
                x: r * Math.cos(newTheta),
                y: r * Math.sin(newTheta)
            };
        }

        for (const shape of allShapes) {
            ctx.beginPath();
            
            const p0 = transformPoint(shape.startX, shape.startY);
            ctx.moveTo(p0.x, p0.y);
            
            for (const pt of shape.points) {
                const p = transformPoint(pt.x, pt.y);
                ctx.lineTo(p.x, p.y);
            }

            ctx.strokeStyle = shape.color;
            ctx.lineWidth = 2 / scale;
            if (shape.fill) {
                ctx.fillStyle = "black";
                ctx.fill();
            }
            ctx.stroke();
        }
        
        requestAnimationFrame(startSpin);
    }

    resize(); 
    turtle = new Turtle(ctx);

    setTimeout(() => {
        requestAnimationFrame(drawFrame);
    }, 3000);

</script>
</body>
</html>
