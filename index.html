<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000; 
    }

    #screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer; 
    }

    #start-circle {
        position: absolute;
        z-index: 20;
        width: 120px;
        height: 120px;
        background-color: rgba(250, 94, 94, 0.95);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        font-family: 'Pacifico', cursive;
        font-size: 2rem;
        box-shadow: 0 0 30px rgba(250, 94, 94, 0.6);
        transition: all 1.6s cubic-bezier(0.25, 1, 0.5, 1);
        transform: scale(1);
        opacity: 1;
    }

    #start-circle.hide {
        transform: scale(0);
        opacity: 0;
        pointer-events: none;
    }

    #light {
        width: 10vmax;
        height: 10vmax;
        border-radius: 50%;
        position: absolute;
        background: radial-gradient(
            circle,
            rgba(250, 94, 94, 0.95) 0%,
            rgba(250, 94, 94, 0.75) 20%,
            rgba(250, 94, 94, 0.35) 45%,
            rgba(250, 94, 94, 0.08) 70%,
            rgba(250, 94, 94, 0) 100%
        );
        opacity: 0;
        transform: scale(0.2);
        filter: blur(12px);
    }

    #light.active {
        animation: lightAppear 2.5s ease-out forwards;
    }

    @keyframes lightAppear {
        0% { opacity: 0; transform: scale(0.2); filter: blur(30px); }
        40% { opacity: 0.9; }
        100% { opacity: 1; transform: scale(2.8); filter: blur(60px); }
    }

    #flowerCanvas {
        position: absolute;
        top: 0; left: 0;
        z-index: 10;
    }

    #action-text {
        position: absolute;
        top: 15%; 
        z-index: 30;
        color: #fff;
        font-family: 'Pacifico', cursive;
        font-size: 3rem;
        opacity: 0;
        transition: opacity 0.5s ease;
        pointer-events: none; 
        text-shadow: 0 0 15px rgba(250, 94, 94, 0.8);
    }

    #action-text.show {
        opacity: 1;
    }
</style>
</head>

<body>

<div id="screen">
    <div id="start-circle">Toca</div>
    <div id="light"></div>
    <div id="action-text">move</div>
    <canvas id="flowerCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');
    const actionText = document.getElementById('action-text');

    let scale = 1;
    let dpr = window.devicePixelRatio || 1;

    function resize() {
        dpr = window.devicePixelRatio || 1;
        
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;

        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        ctx.scale(dpr, dpr);
        ctx.translate(window.innerWidth / 2, window.innerHeight / 2);
        
        const minScreen = Math.min(window.innerWidth, window.innerHeight);
        scale = minScreen / 1000; 
        ctx.scale(scale, scale);
        
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
    }
    window.addEventListener('resize', resize);
    
    let allShapes = []; 
    let currentShape = null; 
    let maxRadius = 0; 

    class Turtle {
        constructor(ctx) {
            this.ctx = ctx;
            this.x = 0;
            this.y = 0;
            this.heading = 0;
            this.pen = true;
        }
        penup() { this.pen = false; }
        pendown() { this.pen = true; }
        left(a) { this.heading += a; }
        right(a) { this.heading -= a; }
        
        forward(d) {
            const rad = this.heading * Math.PI / 180;
            this.x += d * Math.cos(rad);
            this.y -= d * Math.sin(rad); 
            
            const currentR = Math.sqrt(this.x * this.x + this.y * this.y);
            if (currentR > maxRadius) {
                maxRadius = currentR;
            }

            if (this.pen) {
                this.ctx.lineTo(this.x, this.y);
                if (currentShape) {
                    currentShape.points.push({x: this.x, y: this.y});
                }
            } else {
                this.ctx.moveTo(this.x, this.y);
            }
        }
        
        circle(radius, extent) {
            const steps = Math.max(Math.floor(Math.abs(extent) / 1.5), 10); 
            const stepAngle = extent / steps;
            const rad = Math.abs(radius);
            const stepLen = 2 * rad * Math.sin((Math.abs(stepAngle) * Math.PI / 180) / 2);
            
            for (let i = 0; i < steps; i++) {
                this.left(stepAngle / 2);
                this.forward(stepLen);
                this.left(stepAngle / 2);
            }
        }
    }

    const colores = ['#FFC800', '#FFE75C', '#FFED8A'];
    
    function dibujo(t, a, n) {
        t.circle(5 + n, 60);
        t.left(a);
        t.circle(5 + n, 60);
    }

    let currentStep = 0;
    const maxSteps = 360; 
    let turtle;

    function drawFrame() {
        for (let j = 0; j < 1; j++) {
            if (currentStep >= maxSteps) {
                setTimeout(() => {
                    actionText.innerText = 'move';
                    actionText.classList.add('show');
                    enableManualSpin(); 
                }, 1000);
                return; 
            }

            const i = currentStep;
            const colorIndex = Math.floor(i / 15) % 3;
            const c = colores[colorIndex];
            
            ctx.strokeStyle = c;
            ctx.fillStyle = "black";
            ctx.lineWidth = 1.5 / scale; 

            ctx.beginPath();
            ctx.moveTo(turtle.x, turtle.y);
            currentShape = { color: c, fill: true, startX: turtle.x, startY: turtle.y, points: [] };
            dibujo(turtle, 90, i / 2);
            ctx.fill(); 
            ctx.stroke(); 
            allShapes.push(currentShape); 

            ctx.beginPath();
            ctx.moveTo(turtle.x, turtle.y);
            currentShape = { color: c, fill: false, startX: turtle.x, startY: turtle.y, points: [] };
            dibujo(turtle, 160, i * 1.2);
            ctx.stroke(); 
            allShapes.push(currentShape); 

            currentShape = null; 
            turtle.penup();
            dibujo(turtle, 0, 0);
            dibujo(turtle, 90, i / 2);
            turtle.pendown();

            currentStep++;
        }
        requestAnimationFrame(drawFrame);
    }

    let currentAngle = 0;
    let targetAngle = 0;
    let velocity = 0; 
    
    let isDragging = false;
    let previousAngleRad = 0;
    let inactivityTimer = null;
    let isAnimating = false;

    const MAX_VELOCITY = 4.5; 

    function getPointerAngle(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const dx = clientX - window.innerWidth / 2;
        const dy = clientY - window.innerHeight / 2;
        return Math.atan2(dy, dx);
    }

    function drawFlowerWithDeformation(angleDeg, speed) {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        
        ctx.scale(dpr, dpr);
        ctx.translate(window.innerWidth / 2, window.innerHeight / 2);
        ctx.scale(scale, scale);
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        const baseRotationRad = angleDeg * Math.PI / 180;
        
        const threshold = maxRadius * 0.55; 
        
        const bendFactor = speed * 0.010; 

        function transformPoint(x, y) {
            const r = Math.sqrt(x * x + y * y); 
            const theta = Math.atan2(y, x); 

            let dragRad = 0;
            if (r > threshold) {
                dragRad = -(bendFactor * (r - threshold)) * (Math.PI / 180);
            }
            
            const newTheta = theta + baseRotationRad + dragRad;

            return {
                x: r * Math.cos(newTheta),
                y: r * Math.sin(newTheta)
            };
        }

        for (const shape of allShapes) {
            ctx.beginPath();
            const p0 = transformPoint(shape.startX, shape.startY);
            ctx.moveTo(p0.x, p0.y);
            
            for (const pt of shape.points) {
                const p = transformPoint(pt.x, pt.y);
                ctx.lineTo(p.x, p.y);
            }

            ctx.strokeStyle = shape.color;
            ctx.lineWidth = 1.5 / scale;
            if (shape.fill) {
                ctx.fillStyle = "black";
                ctx.fill();
            }
            ctx.stroke();
        }
    }

    function interactiveRenderLoop() {
        let force = (targetAngle - currentAngle) * 0.06; 
        
        velocity += force;
        velocity *= 0.85; 

        if (velocity > MAX_VELOCITY) velocity = MAX_VELOCITY;
        if (velocity < -MAX_VELOCITY) velocity = -MAX_VELOCITY;
        
        currentAngle += velocity;
        
        drawFlowerWithDeformation(currentAngle, velocity);
        
        requestAnimationFrame(interactiveRenderLoop);
    }

    function enableManualSpin() {
        if (!isAnimating) {
            isAnimating = true;
            interactiveRenderLoop();
        }

        function onPointerDown(e) {
            isDragging = true;
            previousAngleRad = getPointerAngle(e);
            
            actionText.classList.remove('show');
            if (inactivityTimer) clearTimeout(inactivityTimer);
        }

        function onPointerMove(e) {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault(); 
            
            const currentPointerAngleRad = getPointerAngle(e);
            let deltaRad = currentPointerAngleRad - previousAngleRad;
            
            if (deltaRad > Math.PI) deltaRad -= 2 * Math.PI;
            if (deltaRad < -Math.PI) deltaRad += 2 * Math.PI;
            
            targetAngle += deltaRad * (180 / Math.PI);
            previousAngleRad = currentPointerAngleRad;
        }

        function onPointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            
            inactivityTimer = setTimeout(() => {
                actionText.innerText = 'mover';
                actionText.classList.add('show');
            }, 3000);
        }

        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);

        window.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('touchend', onPointerUp);
    }

    resize(); 
    turtle = new Turtle(ctx);

    const screenEl = document.getElementById('screen');
    const startCircle = document.getElementById('start-circle');
    const lightEl = document.getElementById('light');

    function iniciarExperiencia() {
        screenEl.removeEventListener('click', iniciarExperiencia);
        screenEl.removeEventListener('touchstart', iniciarExperiencia);
        screenEl.style.cursor = 'default';

        startCircle.classList.add('hide');

        setTimeout(() => {
            lightEl.classList.add('active');
            
            setTimeout(() => {
                requestAnimationFrame(drawFrame);
            }, 1000);
            
        }, 2000); 
    }

    screenEl.addEventListener('click', iniciarExperiencia);
    screenEl.addEventListener('touchstart', iniciarExperiencia);

</script>
</body>
</html>
